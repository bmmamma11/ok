<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Group Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; background-color: #e5ddd5; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { margin-bottom: 15px; padding: 8px 12px; border-radius: 8px; background: white; max-width: 70%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .user-name { font-weight: bold; color: #075e54; font-size: 0.85em; margin-bottom: 3px; }
        .input-area { padding: 15px; display: flex; background: #f0f0f0; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px; border: 1px solid #fff; border-radius: 25px; outline: none; font-size: 16px; }
        button { padding: 10px 20px; margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:active { background: #128c7e; }
    </style>
</head>
<body>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="စာရိုက်ပါ...">
        <button id="sendBtn">ပို့မည်</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://gstatic.com";

        // အမှားတွေ့ရင် သိနိုင်ရန်
        window.onerror = (msg) => alert("Error: " + msg);

        // သင့်ရဲ့ ပုံထဲက Config အသစ်
        const firebaseConfig = {
            apiKey: "AIzaSyDDqLaXkGPKN-Dohja-hs7v632fxIPufU8",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "laoo-68bb5",
            storageBucket: "laoo-68bb5.firebasestorage.app",
            messagingSenderId: "487533047054",
            appId: "1:487533047054:web:ed2a0badb70d279fa17b5f",
            measurementId: "G-00NZ96P4DS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // နာမည်တောင်းခြင်း
        let userName = localStorage.getItem("chat_name");
        if (!userName) {
            userName = prompt("Group ထဲမဝင်ခင် သင့်နာမည်လေး ပေးပါဦး:");
            if (!userName || userName.trim() === "") userName = "User" + Math.floor(Math.random() * 1000);
            localStorage.setItem("chat_name", userName);
        }

        const chatBox = document.getElementById("chat-box");
        const msgInput = document.getElementById("msgInput");

        // စာပို့ခြင်း
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (text === "") return;
            
            try {
                await addDoc(collection(db, "messages"), {
                    user: userName,
                    text: text,
                    createdAt: serverTimestamp()
                });
                msgInput.value = "";
            } catch (e) {
                alert("Database Rules ကို Test Mode ပေးထားလား ပြန်စစ်ပေးပါ: " + e.message);
            }
        }

        document.getElementById("sendBtn").onclick = sendMessage;
        msgInput.onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };

        // Realtime စာဖတ်ခြင်း
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "msg";
                div.innerHTML = `<div class="user-name">${data.user}</div><div>${data.text}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
