<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Firebase Chat</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #ece5dd; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; }
        .m { background: white; padding: 8px; margin-bottom: 8px; border-radius: 5px; }
        .u { font-weight: bold; color: green; font-size: 0.8em; }
        .input { padding: 10px; display: flex; background: #f0f0f0; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input">
        <input type="text" id="msg" placeholder="စာရိုက်ပါ...">
        <button onclick="send()">ပို့မည်</button>
    </div>

    <!-- Firebase Scripts -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "laoo-68bb5.firebasestorage.app",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // နာမည်တောင်းခြင်း
        let user = localStorage.getItem("name") || prompt("သင့်နာမည်ပေးပါ:");
        if (user) localStorage.setItem("name", user);
        else user = "Guest";

        // စာပို့ခြင်း
        window.send = async () => {
            const input = document.getElementById('msg');
            if (input.value) {
                await addDoc(collection(db, "messages"), {
                    u: user,
                    t: input.value,
                    time: serverTimestamp()
                });
                input.value = "";
            }
        };

        // စာဖတ်ခြင်း
        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                box.innerHTML += `<div class="m"><div class="u">${d.u}</div>${d.t}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
