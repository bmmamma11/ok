<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App Final</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; }
        #chat { flex: 1; overflow-y: auto; padding: 65px 10px 80px 10px; display: flex; flex-direction: column; width: 100%; }

        .msg-container { display: flex; align-items: center; margin-bottom: 15px; width: 100%; }
        .msg-container.own { flex-direction: row-reverse; }
        .msg-container.other { flex-direction: row; }

        .bubble-wrap { display: flex; flex-direction: column; max-width: 70%; }
        .own .bubble-wrap { align-items: flex-end; }

        .bubble { padding: 8px 14px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .own .bubble { background: #dcf8c6; border-top-right-radius: 2px; }
        .other .bubble { background: #fff; border-top-left-radius: 2px; }

        .heart-wrap { display: flex; flex-direction: column; align-items: center; margin: 0 12px; min-width: 35px; }
        .heart-btn { background: white; border: 1px solid #ddd; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); padding: 0; }
        .count-text { font-size: 11px; color: #666; margin-top: 3px; font-weight: bold; }

        .meta { font-size: 10px; color: #888; margin-top: 4px; padding: 0 5px; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; z-index: 1000; }
        input#m { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button#s { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-size: 14px;">👤 <span id="display-name">...</span></div>
        <button onclick="changeName()" style="background:#128c7e; color:white; border:1px solid #fff; border-radius:10px; padding:4px 10px; font-size:11px; cursor:pointer;">နာမည်ပြောင်း</button>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <!-- Firebase SDK - Realtime Database ကို သုံးပါမည် -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            // အရေးကြီးသည်- အောက်ပါ URL သည် အစ်ကို့ Project အတွက် ဖြစ်ရပါမည်
            databaseURL: "https://firebaseio.com", 
            projectId: "laoo-68bb5",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let user = localStorage.getItem("name") || "ဧည့်သည်";
        document.getElementById('display-name').innerText = user;

        window.changeName = () => {
            const n = prompt("နာမည်အသစ်:", user);
            if(n && n.trim() !== "") { localStorage.setItem("name", n); location.reload(); }
        };

        // စာပို့ခြင်း
        document.getElementById('s').onclick = () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                const msgRef = push(ref(db, 'messages'));
                set(msgRef, {
                    u: user,
                    t: i.value,
                    likes: 0,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
                i.value = "";
            }
        };

        // စာဖတ်ခြင်းနှင့် အသည်းပေးခြင်း
        onValue(ref(db, 'messages'), (snapshot) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const id = childSnapshot.key;
                const d = childSnapshot.val();
                const isOwn = d.u === user;
                const likes = d.likes || 0;
                const heartIcon = (likes > 0) ? "❤️" : "🤍";

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-container ${isOwn ? 'own' : 'other'}`;
                msgDiv.innerHTML = `
                    <div class="heart-wrap">
                        <button class="heart-btn" onclick="giveHeart('${id}', ${likes})">${heartIcon}</button>
                        <span class="count-text">${likes}</span>
                    </div>
                    <div class="bubble-wrap">
                        <div style="font-size:10px; color:#555; margin-bottom:2px; padding:0 5px;">${d.u}</div>
                        <div class="bubble">${d.t}</div>
                        <div class="meta">${d.time}</div>
                    </div>
                `;
                box.appendChild(msgDiv);
            });
            box.scrollTop = box.scrollHeight;
        });

        // Global အသည်းပေး function
        window.giveHeart = (id, currentLikes) => {
            const updates = {};
            updates['/messages/' + id + '/likes'] = currentLikes + 1;
            update(ref(db), updates);
        };
    </script>
</body>
</html>
