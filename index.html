<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Chat App</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }

        .msg-row { display: flex; flex-direction: column; margin-bottom: 12px; max-width: 85%; }
        .msg-row.own { align-self: flex-end; align-items: flex-end; }
        .msg-row.other { align-self: flex-start; align-items: flex-start; }

        .user-name { font-size: 11px; color: #555; margin-bottom: 3px; padding: 0 5px; }
        
        .bubble { padding: 8px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .own .bubble { background: #dcf8c6; color: #000; border-top-right-radius: 2px; }
        .other .bubble { background: #fff; color: #000; border-top-left-radius: 2px; }

        .meta-data { display: flex; align-items: center; margin-top: 4px; }
        .time { font-size: 10px; color: #888; margin: 0 10px; }

        .heart-btn { 
            background: white; border: 1px solid #ddd; border-radius: 20px; 
            padding: 3px 10px; cursor: pointer; display: flex; align-items: center; 
            font-size: 14px; gap: 5px; transition: 0.2s; box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }
        .heart-btn:active { transform: scale(0.9); }

        .input-box { padding: 10px; background: #f0f0f0; display: flex; align-items: center; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 15px; }
        button#s { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div class="input-box">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "://appspot.com",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let user = localStorage.getItem("name") || prompt("သင့်နာမည်လေး ရိုက်ပေးပါ:");
        if (!user || user.trim() === "") user = "Guest";
        localStorage.setItem("name", user);

        const sendMessage = async () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                try {
                    await addDoc(collection(db, "messages"), { 
                        u: user, t: i.value, time: serverTimestamp(), likes: 0 
                    });
                    i.value = "";
                } catch (e) { console.error(e); }
            }
        };

        document.getElementById('s').onclick = sendMessage;
        document.getElementById('m').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach(dDoc => {
                const d = dDoc.data();
                const id = dDoc.id;
                const isOwn = d.u === user;
                const timeStr = d.time ? d.time.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                
                // Count က 0 ဆိုရင် အဖြူ၊ 0 ထက်များရင် အနီ
                const heartIcon = (d.likes > 0) ? "❤️" : "🤍";

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-row ${isOwn ? 'own' : 'other'}`;
                msgDiv.innerHTML = `
                    <div class="user-name">${d.u}</div>
                    <div class="bubble">${d.t}</div>
                    <div class="meta-data">
                        <span class="time">${timeStr}</span>
                        <button class="heart-btn" id="btn-${id}">
                            ${heartIcon} <span>${d.likes || 0}</span>
                        </button>
                    </div>
                `;
                box.appendChild(msgDiv);

                // အသည်းပေးဖို့ Click Event ချိတ်ဆက်ခြင်း
                document.getElementById(`btn-${id}`).onclick = async () => {
                    const msgRef = doc(db, "messages", id);
                    await updateDoc(msgRef, { likes: increment(1) });
                };
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
