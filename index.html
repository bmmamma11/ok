<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Myanmar Chat</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-header { background: #0084ff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 70%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .sender { font-size: 10px; font-weight: bold; display: block; margin-bottom: 2px; color: #555; }
        .received { background: white; align-self: flex-start; }
        .sent { background: #0084ff; color: white; align-self: flex-end; }
        #chat-form { display: flex; padding: 10px; background: white; border-top: 1px solid #ddd; }
        #msg-input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
        #send-btn { background: #0084ff; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; margin-left: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-header">Myanmar Real-time Chat</div>
<div id="chat-messages"></div>

<div id="chat-form">
    <input type="text" id="msg-input" placeholder="စာရိုက်ပါ..." autocomplete="off">
    <button id="send-btn">➤</button>
</div>

<script>
    // 👇 ဒီနေရာမှာ Firebase ကပေးတဲ့ သင့်ရဲ့ ကိုယ်ပိုင် Config နဲ့ အစားထိုးပါ
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_://firebaseapp.com",
        databaseURL: "https://YOUR_://firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_://appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // နာမည်တောင်းခြင်း
    let userName = localStorage.getItem("chat_username");
    if (!userName) {
        userName = prompt("သင့်နာမည်လေး ရိုက်ထည့်ပေးပါ-") || "Guest" + Math.floor(Math.random() * 100);
        localStorage.setItem("chat_username", userName);
    }

    const messagesContainer = document.getElementById('chat-messages');
    const msgInput = document.getElementById('msg-input');

    // စာပို့ခြင်း
    document.getElementById('send-btn').onclick = () => {
        const text = msgInput.value.trim();
        if (text) {
            db.ref("messages").push().set({
                name: userName,
                message: text,
                time: Date.now()
            });
            msgInput.value = "";
        }
    };

    // စာများဖတ်ခြင်း (Real-time)
    db.ref("messages").limitToLast(20).on("child_added", (snapshot) => {
        const data = snapshot.val();
        const type = data.name === userName ? 'sent' : 'received';
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('msg', type);
        msgDiv.innerHTML = `<span class="sender">${data.name}</span>${data.message}`;
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });
</script>

</body>
</html>
