<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger Group</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 100; flex-shrink: 0; }
        .btns { display: flex; gap: 8px; }
        .btn { background: rgba(255,255,255,0.15); padding: 6px 12px; border-radius: 18px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; position: relative; }
        .user-name { font-weight: bold; font-size: 11px; margin-bottom: 3px; display: block; }
        
        /* အချိန် ဒီဇိုင်း */
        .msg-time { font-size: 10px; opacity: 0.6; display: block; margin-top: 4px; }

        .my-msg { align-self: flex-end; background: #dcf8c6; color: #303030; border-top-right-radius: 2px; }
        .my-msg .user-name { color: #075e54; text-align: right; }
        .my-msg .msg-time { text-align: right; }
        
        .other-msg { align-self: flex-start; background: #ffffff; color: #303030; border-top-left-radius: 2px; }
        .other-msg .user-name { color: #128c7e; }
        .other-msg .msg-time { text-align: left; }

        .input-area { background: #f0f0f0; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #ddd; flex-shrink: 0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 10px 15px; border: 1px solid #fff; border-radius: 20px; outline: none; font-size: 15px; background: white; }
        button { background: #075e54; color: white; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <span>စမ်းသပ်</span>
        <div class="btns">
            <div id="sound-btn" class="btn" onclick="activateAudio()">🔔 အသံဖွင့်</div>
            <div class="btn" onclick="editName()">နာမည်ပြင်</div>
        </div>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "laoo-68bb5.firebasestorage.app",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('m');

        const alertSound = new Audio("https://githubusercontent.com");
        
        window.activateAudio = () => {
            alertSound.play().then(() => {
                alertSound.pause();
                alertSound.currentTime = 0;
                document.getElementById('sound-btn').style.background = "#4caf50";
                document.getElementById('sound-btn').innerText = "🔊 ဖွင့်ပြီး";
            }).catch(e => console.log("Sound error: ", e));
        };

        window.editName = () => {
            let n = prompt("နာမည်အသစ်:");
            if (n && n.trim()) { localStorage.setItem("name", n.trim()); location.reload(); }
        };

        let user = localStorage.getItem("name") || prompt("သင့်နာမည်ပေးပါ:");
        if (!user || !user.trim()) user = "Guest" + Math.floor(Math.random() * 100);
        localStorage.setItem("name", user);

        document.getElementById('s').onclick = async () => {
            const text = msgInput.value.trim();
            if (text) {
                msgInput.value = "";
                await addDoc(collection(db, "messages"), { u: user, t: text, time: serverTimestamp() });
            }
        };

        let isFirstLoad = true;
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
            chatBox.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.u === user;
                
                // အချိန်ကို Format လုပ်ခြင်း (ဥပမာ - 10:30 AM)
                let timeStr = "";
                if(d.time) {
                    const date = d.time.toDate();
                    timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }

                const div = document.createElement("div");
                div.className = `msg ${isMe ? 'my-msg' : 'other-msg'}`;
                div.innerHTML = `
                    <span class="user-name">${d.u}</span>
                    <div>${d.t}</div>
                    <span class="msg-time">${timeStr}</span>
                `;
                chatBox.appendChild(div);

                if (!isFirstLoad && !isMe && !doc.metadata.hasPendingWrites) {
                    alertSound.play().catch(e => console.log(e));
                }
            });
            isFirstLoad = false;
            chatBox.scrollTo(0, chatBox.scrollHeight);
        });

        msgInput.onkeypress = (e) => { if(e.key === "Enter") document.getElementById('s').click(); };
    </script>
</body>
</html>
