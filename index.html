<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App - Like Fix</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; }
        #chat { flex: 1; overflow-y: auto; padding: 65px 10px 75px 10px; display: flex; flex-direction: column; width: 100%; }
        .msg-row { display: flex; flex-direction: column; margin-bottom: 12px; max-width: 85%; }
        .msg-row.own { align-self: flex-end; align-items: flex-end; }
        .msg-row.other { align-self: flex-start; align-items: flex-start; }
        .bubble { padding: 8px 12px; border-radius: 15px; font-size: 14px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .own .bubble { background: #dcf8c6; border-top-right-radius: 2px; }
        .other .bubble { background: #fff; border-top-left-radius: 2px; }
        .meta-data { display: flex; align-items: center; margin-top: 4px; }
        .time { font-size: 10px; color: #888; margin-right: 8px; }
        .heart-btn { background: white; border: 1px solid #ccc; border-radius: 20px; padding: 3px 10px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .input-area { position: fixed; bottom: 0; left: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; z-index: 1000; }
        input#m { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button#s { margin-left: 8px; background: #075e54; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div style="font-size: 14px;">👤 <span id="display-name">...</span></div>
        <button onclick="changeName()" style="background:#128c7e; color:white; border:1px solid #fff; border-radius:10px; padding:4px 8px; font-size:11px;">နာမည်ပြောင်း</button>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "://appspot.com",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let user = localStorage.getItem("name") || "ဧည့်သည်";
        document.getElementById('display-name').innerText = user;

        window.changeName = () => {
            const n = prompt("နာမည်အသစ်:", user);
            if(n) { localStorage.setItem("name", n); location.reload(); }
        };

        document.getElementById('s').onclick = async () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                await addDoc(collection(db, "messages"), { u: user, t: i.value, time: serverTimestamp(), likes: 0 });
                i.value = "";
            }
        };

        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach((dDoc) => {
                const d = dDoc.data();
                const id = dDoc.id;
                const isOwn = d.u === user;
                const timeStr = d.time ? d.time.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                
                const count = d.likes || 0;
                const heartIcon = (count > 0) ? "❤️" : "🤍";

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-row ${isOwn ? 'own' : 'other'}`;
                msgDiv.innerHTML = `
                    <div style="font-size:11px; color:#555; margin-bottom:2px;">${d.u}</div>
                    <div class="bubble">${d.t}</div>
                    <div class="meta-data">
                        <span class="time">${timeStr}</span>
                        <button class="heart-btn" id="btn-${id}">
                            ${heartIcon} <span>${count}</span>
                        </button>
                    </div>
                `;
                box.appendChild(msgDiv);

                // Like ပေးတဲ့ အပိုင်းကို သေချာပြင်ထားပါတယ်
                document.getElementById(`btn-${id}`).onclick = async () => {
                    const msgRef = doc(db, "messages", id);
                    try {
                        // လက်ရှိ Count ကို 1 တိုးပြီး Update လုပ်ခြင်း
                        await updateDoc(msgRef, { 
                            likes: count + 1 
                        });
                    } catch (err) {
                        console.error("Update Error:", err);
                    }
                };
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
