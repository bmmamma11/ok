<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Final Fixed</title>
    <style>
        /* အကုန်လုံးကို border-box ပြောင်းလိုက်ပါသည် */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #dfe5eb; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #075e54; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0; }
        
        .edit-btn { background: rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px; font-size: 0.8em; cursor: pointer; }

        /* အရေးကြီး - height ကို တွက်ချက်ပြီး padding ထည့်ထားပါသည် */
        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            background: #e5ddd5;
            /* စာရိုက်တဲ့ဘားထက် ကျော်လွန်အောင် နေရာလွတ်အကြီးကြီး ပေးထားခြင်း */
            padding-bottom: 150px !important; 
        }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 0.95em; box-shadow: 0 1px 2px rgba(0,0,0,0.2); word-wrap: break-word; position: relative; }
        .user-name { font-weight: bold; font-size: 0.75em; margin-bottom: 4px; display: block; }
        
        .my-msg { align-self: flex-end; background: #ffffff; border-bottom-right-radius: 2px; color: #333; border: 1px solid #d1d1d1; }
        .my-msg .user-name { color: #075e54; text-align: right; }

        .other-msg { align-self: flex-start; background: #075e54; color: white; border-bottom-left-radius: 2px; }
        .other-msg .user-name { color: #80cbc4; }

        /* Input Area ကို ပိုပြီး သေသပ်အောင် ပြင်ထားပါသည် */
        .input-area { 
            position: fixed; 
            bottom: 0; 
            left: 0;
            right: 0;
            width: 100%; 
            padding: 10px 15px; 
            background: #f0f0f0; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1); 
            z-index: 9999;
        }
        
        input { flex: 1; padding: 12px 18px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 16px; background: white; }
        
        button { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    </style>
</head>
<body>

    <header>
        <span>Messenger Group</span>
        <div class="edit-btn" onclick="editName()">နာမည်ပြင်ရန်</div>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "laoo-68bb5.firebasestorage.app",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('m');

        window.editName = () => {
            let n = prompt("နာမည်အသစ်:");
            if (n) { localStorage.setItem("name", n.trim()); location.reload(); }
        };

        let user = localStorage.getItem("name") || prompt("သင့်နာမည်ပေးပါ:");
        if (!user) user = "Guest" + Math.floor(Math.random() * 100);
        localStorage.setItem("name", user);

        document.getElementById('s').onclick = async () => {
            const text = msgInput.value.trim();
            if (text !== "") {
                msgInput.value = "";
                await addDoc(collection(db, "messages"), { u: user, t: text, time: serverTimestamp() });
            }
        };

        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
            chatBox.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.u === user;
                const div = document.createElement("div");
                div.className = `msg ${isMe ? 'my-msg' : 'other-msg'}`;
                div.innerHTML = `<span class="user-name">${d.u}</span>${d.t}`;
                chatBox.appendChild(div);
            });
            // အောက်ဆုံးသို့ ရွှေ့ပေးခြင်း
            chatBox.scrollTo(0, chatBox.scrollHeight);
        });

        msgInput.onkeypress = (e) => { if(e.key === "Enter") document.getElementById('s').click(); };
    </script>
</body>
</html>
