<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App - Complete</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1001; height: 50px; }
        .status-bar { background: #075e54; padding: 10px 5px; display: flex; gap: 12px; overflow-x: auto; position: fixed; top: 50px; width: 100%; z-index: 1000; border-top: 1px solid #128c7e; height: 100px; align-items: center; }
        .status-user { display: flex; flex-direction: column; align-items: center; min-width: 65px; color: white; }
        .p-wrap { position: relative; width: 50px; height: 50px; }
        .status-p-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #ccc; padding: 2px; }
        .active-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #2ecc71; border-radius: 50%; border: 2px solid #075e54; }
        .status-name { font-size: 11px; margin-top: 5px; text-align: center; width: 65px; overflow: hidden; text-overflow: ellipsis; }
        #chat { flex: 1; overflow-y: auto; padding: 160px 10px 80px 10px; display: flex; flex-direction: column; }
        .msg-container { display: flex; flex-direction: column; margin-bottom: 12px; max-width: 85%; }
        .msg-container.own { align-self: flex-end; align-items: flex-end; }
        .msg-container.other { align-self: flex-start; align-items: flex-start; }
        .bubble-row { display: flex; align-items: center; gap: 8px; width: 100%; }
        .own .bubble-row { flex-direction: row-reverse; }
        .bubble { padding: 10px 15px; border-radius: 20px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .own .bubble { background: #dcf8c6; border-top-right-radius: 4px; }
        .other .bubble { background: #fff; border-top-left-radius: 4px; }
        .heart-btn { background: white; border: 1px solid #ddd; border-radius: 15px; padding: 3px 8px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 3px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); flex-shrink: 0; }
        .heart-btn.active { border-color: #ff5252; color: #ff5252; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; z-index: 1001; }
        input#m { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button#s { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="top-bar">
        <div><img id="top-p-img" src="" style="width:30px;height:30px;border-radius:50%"> <span id="display-name" style="font-weight:bold">...</span></div>
        <button onclick="editProfile()" style="background:#128c7e;color:white;border:none;padding:5px 10px;border-radius:5px">ပြုပြင်ရန်</button>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <div id="chat"></div>
    <div class="input-area"><input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off"><button id="s">➤</button></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc, query, orderBy, onSnapshot, serverTimestamp, limit, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "://appspot.com",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const FIXED_IMG = "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhZyEN60GGQ1q2nHs55YkoF2tesvV9xgpvc2HYVktG5PhVLvHQSwKAmaHIE6BL0EBJH1HQ3ggUVw2ABI18_u6fap_Ex5JpzR_nAyebTl2u7OFLSDWtAocM_wRmNtnOAv1iRz99s9lURg_llcWrofEk9dWCjqakbXWWKpY04OhvHFQ0GvFAhBJE7ENs_lcM/s740/1000008702.jpg";
        const IMG = "https://googleusercontent.com";

        let user = localStorage.getItem("name") || "User_" + Math.floor(Math.random() * 1000);
        document.getElementById('display-name').innerText = user;
        document.getElementById('top-p-img').src = IMG;

        const updatePresence = async () => {
            await setDoc(doc(db, "presence", user), { u: user, img: IMG, time: serverTimestamp() }, { merge: true });
        };
        updatePresence();
        setInterval(updatePresence, 30000);

        onSnapshot(query(collection(db, "presence"), orderBy("time", "desc"), limit(10)), (snap) => {
            const sBar = document.getElementById('status-bar');
            sBar.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (!d.time) return;
                const diff = Math.floor((new Date().getTime() - d.time.toDate().getTime()) / 60000);
                const active = diff < 5;
                sBar.innerHTML += `<div class="status-user"><div class="p-wrap"><img src="${d.img}" class="status-p-img" style="border-color:${active?'#2ecc71':'#ccc'}">${active?'<div class="active-dot"></div>':''}</div><div class="status-name">${d.u}</div><div style="font-size:9px;opacity:0.8">${active?'Active now':diff+'m ago'}</div></div>`;
            });
        });

        document.getElementById('s').onclick = async () => {
            const i = document.getElementById('m');
            if (i.value.trim()) {
                const text = i.value; i.value = "";
                await addDoc(collection(db, "messages"), { u: user, img: IMG, t: text, time: serverTimestamp(), likedBy: [] });
                updatePresence();
            }
        };

        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const isOwn = d.u === user;
                const likedBy = d.likedBy || [];
                const hasLiked = likedBy.includes(user);
                box.innerHTML += `
                    <div class="msg-container ${isOwn ? 'own' : 'other'}">
                        <div class="bubble-row">
                            <img src="${d.img}" style="width:30px;height:30px;border-radius:50%">
                            <div class="bubble">${d.t}</div>
                            <button class="heart-btn ${hasLiked ? 'active' : ''}" onclick="toggleLike('${docSnap.id}', ${hasLiked})">❤️ <span>${likedBy.length}</span></button>
                        </div>
                        <div style="font-size:10px;color:#888;margin-top:4px">${isOwn?'✓✓ ':''}${d.u} • ${d.time?d.time.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'...'}</div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });

        window.toggleLike = async (id, hasLiked) => {
            await updateDoc(doc(db, "messages", id), { likedBy: hasLiked ? arrayRemove(user) : arrayUnion(user) });
        };

        window.editProfile = () => {
            const n = prompt("နာမည်အသစ်:", user);
            if(n) { localStorage.setItem("name", n); location.reload(); }
        };
    </script>
</body>
</html>
