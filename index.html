<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { background: white; padding: 8px 12px; margin-bottom: 10px; border-radius: 10px; max-width: 80%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .user { font-weight: bold; color: #075e54; font-size: 0.8em; margin-bottom: 3px; }
        .input-box { padding: 10px; background: #f0f0f0; display: flex; }
        input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button { margin-left: 5px; background: #075e54; color: white; border: none; border-radius: 50%; width: 40px; height: 45px; cursor: pointer; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="m" placeholder="စာရိုက်ပါ...">
        <button id="s">➤</button>
    </div>

    <script type="module">
        // Firebase SDK များကို ချိတ်ဆက်ခြင်း (လိပ်စာအမှန်များ)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // အစ်ကို့ရဲ့ Firebase Config အစစ်အမှန်
        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "laoo-68bb5.firebasestorage.app",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // နာမည်တောင်းခြင်း (ပထမဆုံးတစ်ခါသာ)
        let user = localStorage.getItem("name") || prompt("သင့်နာမည်လေး ပေးပါဦး:");
        if (!user || user.trim() === "") user = "Guest" + Math.floor(Math.random() * 100);
        localStorage.setItem("name", user);

        // စာပို့သည့် Function
        document.getElementById('s').onclick = async () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                try {
                    await addDoc(collection(db, "messages"), { 
                        u: user, 
                        t: i.value, 
                        time: serverTimestamp() 
                    });
                    i.value = "";
                } catch(e) {
                    console.error("Error: ", e);
                    alert("စာပို့မရပါ၊ Firestore Rules ကို စစ်ပေးပါ။");
                }
            }
        };

        // စာများကို Realtime ဖတ်ပြခြင်း
        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                box.innerHTML += `<div class="msg"><div class="user">${d.u}</div>${d.t}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
