<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App - Final Version</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; }
        #chat { flex: 1; overflow-y: auto; padding: 65px 10px 80px 10px; display: flex; flex-direction: column; width: 100%; }
        .msg-row { display: flex; align-items: center; margin-bottom: 12px; }
        .msg-row.own { flex-direction: row-reverse; }
        .bubble-wrap { display: flex; flex-direction: column; max-width: 75%; }
        .own .bubble-wrap { align-items: flex-end; }
        .bubble { padding: 8px 14px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); background: #fff; }
        .own .bubble { background: #dcf8c6; border-top-right-radius: 2px; }
        .heart-btn { background: white; border: 1px solid #ddd; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; margin: 0 10px; outline: none; }
        #notify-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 25px; border-radius: 10px; display: none; z-index: 2000; color: white; font-weight: bold; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 12px; display: flex; }
        input#m { flex: 1; padding: 10px 15px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button#s { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div id="notify-box"></div>
    <div class="top-bar">
        <div style="font-size: 14px;">👤 <span id="display-name">...</span></div>
        <button onclick="changeName()" style="background:#128c7e; color:white; border:none; border-radius:10px; padding:4px 8px; font-size:11px;">နာမည်ပြောင်း</button>
    </div>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            databaseURL: "https://firebaseio.com",
            projectId: "laoo-68bb5",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let user = localStorage.getItem("name") || "ဧည့်သည်";
        document.getElementById('display-name').innerText = user;

        window.changeName = () => {
            const n = prompt("နာမည်အသစ်:", user);
            if(n) { user = n; localStorage.setItem("name", n); location.reload(); }
        };

        function tellUser(msg, color) {
            const nb = document.getElementById('notify-box');
            nb.innerText = msg; nb.style.background = color; nb.style.display = "block";
            setTimeout(() => { nb.style.display = "none"; }, 1500);
        }

        document.getElementById('s').onclick = () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                const msgRef = push(ref(db, 'messages'));
                set(msgRef, { u: user, t: i.value, likes: 0 }).then(() => { i.value = ""; });
            }
        };

        onValue(ref(db, 'messages'), (snapshot) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snapshot.forEach((child) => {
                const id = child.key;
                const d = child.val();
                const likes = d.likes || 0;
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-row ${d.u === user ? 'own' : 'other'}`;
                msgDiv.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center;">
                        <button class="heart-btn" onclick="hitHeart('${id}', ${likes})">${likes > 0 ? '❤️' : '🤍'}</button>
                        <span style="font-size:11px; font-weight:bold;">${likes}</span>
                    </div>
                    <div class="bubble-wrap">
                        <div style="font-size:10px; color:#555; margin-bottom:2px; padding:0 5px;">${d.u}</div>
                        <div class="bubble">${d.t}</div>
                    </div>
                `;
                box.appendChild(msgDiv);
            });
            box.scrollTop = box.scrollHeight;
        });

        window.hitHeart = (id, currentLikes) => {
            update(ref(db, 'messages/' + id), { likes: currentLikes + 1 })
            .then(() => { tellUser("အောင်မြင်သည်", "green"); })
            .catch(() => { tellUser("မရပါ (Error)", "red"); });
        };
    </script>
</body>
</html>
