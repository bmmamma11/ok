<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App - Logic Check</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; }
        #chat { flex: 1; overflow-y: auto; padding: 65px 10px 80px 10px; display: flex; flex-direction: column; width: 100%; }
        
        /* Message UI */
        .msg-container { display: flex; align-items: center; margin-bottom: 15px; width: 100%; }
        .msg-container.own { flex-direction: row-reverse; }
        .msg-container.other { flex-direction: row; }
        .bubble { padding: 8px 14px; border-radius: 18px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; background: #fff; max-width: 70%; }
        .own .bubble { background: #dcf8c6; border-top-right-radius: 2px; }
        .other .bubble { background: #fff; border-top-left-radius: 2px; }

        /* Heart UI */
        .heart-wrap { display: flex; flex-direction: column; align-items: center; margin: 0 10px; min-width: 35px; }
        .heart-btn { background: white; border: 1px solid #ddd; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; outline: none; }
        .count-text { font-size: 11px; color: #666; margin-top: 2px; font-weight: bold; }

        /* အောင်မြင်ကြောင်းပြတဲ့ Box */
        #status-box { 
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            padding: 8px 15px; border-radius: 20px; font-size: 12px; color: white;
            display: none; z-index: 2000;
        }

        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; z-index: 1000; }
        input#m { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button#s { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="status-box"></div>

    <div class="top-bar">
        <div style="font-size: 14px;">👤 <span id="display-name">...</span></div>
        <button onclick="changeName()" style="background:#128c7e; color:white; border:1px solid #fff; border-radius:10px; padding:4px 10px; font-size:11px; cursor:pointer;">နာမည်ပြောင်း</button>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "://appspot.com",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let user = localStorage.getItem("name") || "ဧည့်သည်";
        document.getElementById('display-name').innerText = user;

        window.changeName = () => {
            const n = prompt("နာမည်အသစ်:", user);
            if(n) { user = n; localStorage.setItem("name", n); document.getElementById('display-name').innerText = n; location.reload(); }
        };

        // Status ပြတဲ့ Function
        function showStatus(msg, isError = false) {
            const box = document.getElementById('status-box');
            box.innerText = msg;
            box.style.background = isError ? "#e74c3c" : "#2ecc71";
            box.style.display = "block";
            setTimeout(() => { box.style.display = "none"; }, 2000);
        }

        document.getElementById('s').onclick = async () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                try {
                    await addDoc(collection(db, "messages"), { u: user, t: i.value, time: serverTimestamp(), likes: 0 });
                    i.value = "";
                } catch(e) { showStatus("စာပို့မရပါ - Rules စစ်ပါ", true); }
            }
        };

        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach((dDoc) => {
                const d = dDoc.data();
                const id = dDoc.id;
                const count = d.likes || 0;
                const heartIcon = (count > 0) ? "❤️" : "🤍";

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-container ${d.u === user ? 'own' : 'other'}`;
                msgDiv.innerHTML = `
                    <div class="heart-wrap">
                        <button class="heart-btn" id="btn-${id}">${heartIcon}</button>
                        <span class="count-text">${count}</span>
                    </div>
                    <div class="bubble">${d.t}</div>
                `;
                box.appendChild(msgDiv);

                // အသည်းပေးခြင်းနှင့် စစ်ဆေးခြင်း
                document.getElementById(`btn-${id}`).onclick = async () => {
                    const msgRef = doc(db, "messages", id);
                    try {
                        await updateDoc(msgRef, { likes: increment(1) });
                        showStatus("အောင်မြင်သည်"); // Save ဖြစ်သွားရင်ပြမယ်
                    } catch(e) {
                        showStatus("အသည်းပေးလို့မရပါ (Error)", true); // Save မရရင်ပြမယ်
                        console.error(e);
                    }
                };
            });
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
