<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Chat App</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; height: 50px; }
        #chat { flex: 1; overflow-y: auto; padding: 60px 10px 80px 10px; display: flex; flex-direction: column; }
        .msg-container { display: flex; align-items: center; margin-bottom: 15px; width: 100%; }
        .msg-container.own { flex-direction: row-reverse; }
        .msg-container.other { flex-direction: row; }
        .content-box { display: flex; flex-direction: column; max-width: 75%; }
        .own .content-box { align-items: flex-end; }
        .bubble { padding: 10px 15px; border-radius: 20px; font-size: 15px; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .own .bubble { background: #dcf8c6; border-top-right-radius: 4px; }
        .other .bubble { background: #fff; border-top-left-radius: 4px; }
        .meta { font-size: 11px; color: #888; margin-top: 4px; }
        .heart-btn { 
            background: white; border: 1px solid #ddd; border-radius: 20px; 
            min-width: 50px; height: 32px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin: 0 8px; font-size: 14px; transition: 0.2s;
        }
        .heart-btn.active { border-color: #ff5252; color: #ff5252; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; align-items: center; }
        input#m { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        button#s { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>👤 <span id="display-name">...</span></div>
        <button onclick="changeName()" style="background:#128c7e; color:white; border:none; border-radius:5px; padding:5px;">နာမည်ပြောင်း</button>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "://appspot.com",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let user = localStorage.getItem("name") || "User_" + Math.floor(Math.random() * 1000);
        localStorage.setItem("name", user);
        document.getElementById('display-name').innerText = user;

        window.changeName = () => {
            const n = prompt("နာမည်အသစ်:", user);
            if(n) { localStorage.setItem("name", n); location.reload(); }
        };

        document.getElementById('s').onclick = async () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                // likes အစား likedBy array နဲ့ သိမ်းပါမယ်
                await addDoc(collection(db, "messages"), { u: user, t: i.value, time: serverTimestamp(), likedBy: [] });
                i.value = "";
            }
        };

        const q = query(collection(db, "messages"), orderBy("time", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach((dDoc) => {
                const d = dDoc.data();
                const id = dDoc.id;
                const isOwn = d.u === user;
                const timeStr = d.time ? d.time.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
                
                // likedBy array ထဲမှာ ကိုယ့်နာမည် ပါမပါ စစ်မယ်
                const likedBy = d.likedBy || [];
                const hasLiked = likedBy.includes(user);
                const count = likedBy.length;

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-container ${isOwn ? 'own' : 'other'}`;
                msgDiv.innerHTML = `
                    <div class="content-box">
                        <div style="font-size:10px; color:#555; margin-bottom:2px;">${d.u}</div>
                        <div class="bubble">${d.t}</div>
                        <div class="meta">${timeStr}</div>
                    </div>
                    <button class="heart-btn ${hasLiked ? 'active' : ''}" onclick="toggleHeart('${id}', ${hasLiked})">
                        ${hasLiked ? "❤️" : "🤍"} <span>${count}</span>
                    </button>
                `;
                box.appendChild(msgDiv);
            });
            box.scrollTop = box.scrollHeight;
        });

        // Toggle Heart System (လူတစ်ယောက် တစ်ခါပဲ ပေးလို့ရအောင် လုပ်ထားသည်)
        window.toggleHeart = async (id, alreadyLiked) => {
            const msgRef = doc(db, "messages", id);
            try {
                if (alreadyLiked) {
                    // Like ပေးပြီးသားဆိုရင် နာမည်ကို Array ထဲက ပြန်ထုတ်မယ်
                    await updateDoc(msgRef, { likedBy: arrayRemove(user) });
                } else {
                    // Like မပေးရသေးရင် နာမည်ကို Array ထဲ ထည့်မယ်
                    await updateDoc(msgRef, { likedBy: arrayUnion(user) });
                }
            } catch (e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
