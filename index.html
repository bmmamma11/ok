<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Group Chat</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; background: #f9f9f9; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: white; border: 1px solid #ddd; }
        .user-name { font-weight: bold; color: #075e54; font-size: 0.8em; }
        .input-area { padding: 10px; display: flex; background: white; border-top: 1px solid #ccc; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; margin-left: 5px; background: #075e54; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="စာရိုက်ပါ...">
        <button id="sendBtn">ပို့မည်</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://gstatic.com";

        // *** သင်၏ Firebase Config ကို ဒီမှာ ထည့်ပါ ***
        const firebaseConfig = {
            apiKey: "AIzaSyDDqLaXkGPKN-Dohja-hs7v632fxIPufU8",
            authDomain: "laoo-68bb5.firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "laoo-68bb5.firebasestorage.app",
            messagingSenderId: "487533047054",
            appId: "1:487533047054:web:ed2a0badb70d279fa17b5f",
            measurementId: "G-00NZ96P4DS"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ၁။ နာမည် စစ်ဆေးခြင်း (မရှိရင် တောင်းမယ်)
        let userName = localStorage.getItem("chat_name");
        if (!userName) {
            userName = prompt("Group ထဲမဝင်ခင် သင့်နာမည်လေး အရင်ပေးပါ:");
            if (!userName) userName = "Guest" + Math.floor(Math.random() * 1000);
            localStorage.setItem("chat_name", userName);
        }

        const chatBox = document.getElementById("chat-box");
        const msgInput = document.getElementById("msgInput");

        // ၂။ စာပို့တဲ့ Function
        async function sendMessage() {
            if (msgInput.value.trim() === "") return;
            
            await addDoc(collection(db, "messages"), {
                user: userName,
                text: msgInput.value,
                createdAt: serverTimestamp()
            });
            msgInput.value = "";
        }

        document.getElementById("sendBtn").onclick = sendMessage;
        msgInput.onkeypress = (e) => { if(e.key === "Enter") sendMessage(); };

        // ၃။ Database က စာတွေကို အချိန်နဲ့တပြေးညီ (Realtime) ဆွဲထုတ်ခြင်း
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            chatBox.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const div = document.createElement("div");
                div.className = "msg";
                div.innerHTML = `<div class="user-name">${data.user}</div><div>${data.text}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight; // အောက်ဆုံးကို အလိုအလျောက် ဆွဲချပေးမယ်
        });
    </script>
</body>
</html>
