<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Messenger Group</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #dfe5eb; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #075e54; color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .btns { display: flex; gap: 5px; }
        .btn { background: rgba(255,255,255,0.2); padding: 5px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; }

        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #e5ddd5; }
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 15px; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .user-name { font-weight: bold; font-size: 12px; margin-bottom: 2px; display: block; }
        .my-msg { align-self: flex-end; background: #ffffff; color: #333; }
        .other-msg { align-self: flex-start; background: #075e54; color: white; }

        /* စာရိုက်တဲ့နေရာကို အနက်ရောင်ပြောင်းပြီး ပိုထင်ရှားအောင် လုပ်ထားပါတယ် */
        .input-area { 
            background: #222; 
            padding: 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            flex-shrink: 0;
            padding-bottom: 25px; /* ဖုန်း screen အောက်ခြေ မြှားတွေနဲ့ မလွတ်မှာစိုးလို့ */
        }
        input { flex: 1; padding: 12px; border: none; border-radius: 20px; font-size: 16px; }
        button { background: #075e54; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <span>Messenger Group</span>
        <div class="btns">
            <div id="sound-btn" class="btn" onclick="activateAudio()">🔔 အသံဖွင့်</div>
            <div class="btn" onclick="editName()">နာမည်ပြင်</div>
        </div>
    </header>

    <div id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="ဒီမှာစာရိုက်ပါ..." autocomplete="off">
        <button id="s">➤</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "laoo-68bb5.firebasestorage.app",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const chatBox = document.getElementById('chat-box');
        const msgInput = document.getElementById('m');

        // အသံဖိုင် Link အစစ်
        const alertSound = new Audio("https://githubusercontent.com");
        
        window.activateAudio = () => {
            alertSound.play().then(() => {
                alertSound.pause();
                alertSound.currentTime = 0;
                document.getElementById('sound-btn').style.background = "#4caf50";
                document.getElementById('sound-btn').innerText = "🔊 ဖွင့်ပြီး";
            }).catch(e => alert("Error: " + e));
        };

        window.editName = () => {
            let n = prompt("နာမည်အသစ်:");
            if (n) { localStorage.setItem("name", n.trim()); location.reload(); }
        };

        let user = localStorage.getItem("name") || prompt("နာမည်ပေးပါ:");
        if (!user) user = "Guest" + Math.floor(Math.random() * 100);
        localStorage.setItem("name", user);

        document.getElementById('s').onclick = async () => {
            const text = msgInput.value.trim();
            if (text) {
                msgInput.value = "";
                await addDoc(collection(db, "messages"), { u: user, t: text, time: serverTimestamp() });
            }
        };

        let isFirstLoad = true;
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
            chatBox.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.u === user;
                const div = document.createElement("div");
                div.className = `msg ${isMe ? 'my-msg' : 'other-msg'}`;
                div.innerHTML = `<span class="user-name">${d.u}</span><div>${d.t}</div>`;
                chatBox.appendChild(div);

                if (!isFirstLoad && !isMe && !doc.metadata.hasPendingWrites) {
                    alertSound.play().catch(e => console.log(e));
                }
            });
            isFirstLoad = false;
            chatBox.scrollTo(0, chatBox.scrollHeight);
        });

        msgInput.onkeypress = (e) => { if(e.key === "Enter") document.getElementById('s').click(); };
    </script>
</body>
</html>
