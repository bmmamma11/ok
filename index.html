<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App Final Fix</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; background: #e5ddd5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top-bar { background: #075e54; color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000; }
        #chat { flex: 1; overflow-y: auto; padding: 65px 10px 80px 10px; display: flex; flex-direction: column; }
        .msg-container { display: flex; align-items: center; margin-bottom: 15px; }
        .msg-container.own { flex-direction: row-reverse; }
        .msg-container.other { flex-direction: row; }
        .bubble { padding: 10px 15px; border-radius: 20px; font-size: 15px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); background: #fff; }
        .own .bubble { background: #dcf8c6; border-top-right-radius: 2px; }
        .other .bubble { background: #fff; border-top-left-radius: 2px; }
        .heart-wrap { display: flex; flex-direction: column; align-items: center; margin: 0 10px; min-width: 35px; }
        .heart-btn { background: white; border: 1px solid #ddd; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: #f0f0f0; padding: 10px; display: flex; }
        input { flex: 1; padding: 10px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        button#s { margin-left: 10px; background: #075e54; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>👤 <span id="display-name">...</span></div>
        <button onclick="changeName()" style="background:#128c7e; color:white; border:none; border-radius:10px; padding:4px 8px;">နာမည်ပြောင်း</button>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="m" placeholder="စာရိုက်ပါ...">
        <button id="s">➤</button>
    </div>

    <!-- Firebase SDK (Version အဟောင်း ပုံစံဖြင့် ချိတ်ဆက်ခြင်း) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyODqLsXhGPKN-Oohja-hs7v63ZfrIPufU8",
            authDomain: "://firebaseapp.com",
            projectId: "laoo-68bb5",
            storageBucket: "://appspot.com",
            messagingSenderId: "467533047034",
            appId: "1:467533047034:web:ed2a0badb70d279fa17b5f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let user = localStorage.getItem("name") || "ဧည့်သည်";
        document.getElementById('display-name').innerText = user;

        function changeName() {
            const n = prompt("နာမည်အသစ်:", user);
            if(n) { localStorage.setItem("name", n); location.reload(); }
        }

        document.getElementById('s').onclick = async () => {
            const i = document.getElementById('m');
            if (i.value.trim() !== "") {
                await db.collection("messages").add({
                    u: user, t: i.value, time: firebase.firestore.FieldValue.serverTimestamp(), likes: 0
                });
                i.value = "";
            }
        };

        db.collection("messages").orderBy("time", "asc").onSnapshot((snap) => {
            const box = document.getElementById('chat');
            box.innerHTML = "";
            snap.forEach((doc) => {
                const d = doc.data();
                const id = doc.id;
                const likes = d.likes || 0;
                const heartIcon = (likes > 0) ? "❤️" : "🤍";

                const msgDiv = document.createElement('div');
                msgDiv.className = `msg-container ${d.u === user ? 'own' : 'other'}`;
                msgDiv.innerHTML = `
                    <div class="heart-wrap">
                        <button class="heart-btn" onclick="giveHeart('${id}')">${heartIcon}</button>
                        <span style="font-size:10px; font-weight:bold;">${likes}</span>
                    </div>
                    <div class="bubble">${d.t}</div>
                `;
                box.appendChild(msgDiv);
            });
            box.scrollTop = box.scrollHeight;
        });

        async function giveHeart(id) {
            const msgRef = db.collection("messages").doc(id);
            try {
                await msgRef.update({
                    likes: firebase.firestore.FieldValue.increment(1)
                });
            } catch (e) {
                alert("Error: Rules ကို Publish လုပ်ဖို့ လိုအပ်ပါတယ်။");
            }
        }
    </script>
</body>
</html>
